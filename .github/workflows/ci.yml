name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # shared-libs-python is pulled from public GitHub via the git source pinned in
      # pyproject.toml — exactly what an external cloner gets. No private-repo token,
      # no path patching: CI builds the same way `git clone … && uv sync` does.
      - name: Install uv
        # Pin the exact tag: the maintainers have not published a floating `v8`
        # major alias yet (only v8.0.0 / v8.1.0 exist), so `@v8` fails to resolve.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
      - name: Pin Python
        run: uv python install 3.13

      # --frozen omitted: the patch changes the path source, so the lock no longer
      # matches; a plain sync re-resolves against the patched pyproject.
      - name: Install dependencies (core + extras + dev)
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check edgeproc/ tests/
      - name: Format check
        run: uv run ruff format --check edgeproc/ tests/
      - name: Type check
        # Via poe so MYPYPATH resolution for the editable shared-libs-python sibling
        # is shared with local `poe gate` (mypy does not read the install .pth).
        run: uv run poe typecheck
      - name: Complexity (Radon Grade A)
        run: uv run xenon --max-absolute A --max-modules A --max-average A edgeproc/
      - name: Tests with coverage
        run: uv run pytest --cov=edgeproc --cov-report=term-missing --cov-fail-under=90
