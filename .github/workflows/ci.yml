name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Mirrors `uv run poe gate` exactly (house standard §3): the gate IS the CI.
  # Steps inside the gate: ruff lint -> ruff format --check -> mypy strict ->
  # xenon A -> pytest (>=90% coverage).
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        # Full version pin required: astral-sh/setup-uv publishes no floating
        # major tag (`@v8` fails to resolve). Dependabot walks the pin forward.
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"
      - name: Pin Python
        run: uv python install 3.13

      # shared-libs-python is pulled from public GitHub via the git source pinned
      # in pyproject.toml — exactly what an external cloner gets. --frozen: install
      # the committed uv.lock verbatim, so CI cannot silently re-resolve.
      - name: Install dependencies (core + extras + dev)
        run: uv sync --frozen --all-extras

      - name: Run the gate
        run: uv run poe gate

  # Full-history secret scan (house standard §4). GITLEAKS_LICENSE is not
  # needed: this is a personal account, not an organization.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history — gitleaks scans every commit

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
