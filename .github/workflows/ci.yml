name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies (core + extras + dev)
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check edgeproc/ tests/

      - name: Format check
        run: uv run ruff format --check edgeproc/ tests/

      - name: Type check
        run: uv run mypy --strict edgeproc/

      - name: Complexity (Radon Grade A)
        run: uv run xenon --max-absolute A --max-modules A --max-average A edgeproc/

      - name: Tests with coverage
        run: uv run pytest --cov=edgeproc --cov-report=term-missing --cov-fail-under=90
